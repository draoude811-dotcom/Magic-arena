<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🔮 Magic Arena</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; width: 100vw; height: 100vh; }
  canvas { display: block; touch-action: none; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
// ============================================================
// COLOR UTILITIES
// ============================================================
function rgba(c, alphaOverride) {
  const a = alphaOverride !== undefined ? alphaOverride : (c.a !== undefined ? c.a : 1);
  return `rgba(${Math.floor(c.r)},${Math.floor(c.g)},${Math.floor(c.b)},${a})`;
}
function lighten(c, amount) {
  return { r: Math.min(255, c.r + amount), g: Math.min(255, c.g + amount), b: Math.min(255, c.b + amount), a: c.a };
}
function darken(c, amount) {
  return { r: Math.max(0, c.r - amount), g: Math.max(0, c.g - amount), b: Math.max(0, c.b - amount), a: c.a };
}
function lerpColor(a, b, t) {
  return { r: a.r+(b.r-a.r)*t, g: a.g+(b.g-a.g)*t, b: a.b+(b.b-a.b)*t, a: (a.a||1)+((b.a||1)-(a.a||1))*t };
}

// ============================================================
// COORDINATE TRANSFORM (Isometric)
// ============================================================
function worldToScreen(wx, wy, wz, cam, cw, ch) {
  const rx = (wx - cam.x) * cam.zoom;
  const ry = (wy - cam.y) * cam.zoom;
  const sx = cw/2 + rx + cam.offsetX;
  const sy = ch/2 + ry*0.6 - wz*cam.zoom*0.8 + cam.offsetY;
  return { sx, sy, scale: cam.zoom };
}

// ============================================================
// DRAWING PRIMITIVES
// ============================================================
function drawCircle(ctx, x, y, r, fill, stroke, lineWidth) {
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lineWidth||2; ctx.stroke(); }
}
function drawEllipse(ctx, x, y, rx, ry, fill, stroke) {
  ctx.beginPath(); ctx.ellipse(x, y, rx, ry, 0, 0, Math.PI*2);
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 2; ctx.stroke(); }
}
function drawRoundedRect(ctx, x, y, w, h, r, fill, stroke) {
  ctx.beginPath(); ctx.roundRect(x, y, w, h, r);
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 2; ctx.stroke(); }
}
function drawStar(ctx, cx, cy, spikes, outerR, innerR, fill) {
  ctx.beginPath();
  for (let i = 0; i < spikes*2; i++) {
    const r = i%2===0 ? outerR : innerR;
    const angle = (i*Math.PI)/spikes - Math.PI/2;
    const x = cx + Math.cos(angle)*r; const y = cy + Math.sin(angle)*r;
    if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.closePath(); ctx.fillStyle = fill; ctx.fill();
}
function drawHexagon(ctx, cx, cy, r, fill, rotation) {
  rotation = rotation||0;
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const angle = (i*Math.PI)/3 + rotation;
    const x = cx + Math.cos(angle)*r; const y = cy + Math.sin(angle)*r;
    if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.closePath(); ctx.fillStyle = fill; ctx.fill();
}
function drawTriangle(ctx, cx, cy, r, fill, rotation) {
  rotation = rotation||0;
  ctx.beginPath();
  for (let i = 0; i < 3; i++) {
    const angle = (i*Math.PI*2)/3 + rotation - Math.PI/2;
    const x = cx + Math.cos(angle)*r; const y = cy + Math.sin(angle)*r;
    if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.closePath(); ctx.fillStyle = fill; ctx.fill();
}
function drawGlow(ctx, x, y, radius, color, intensity) {
  intensity = intensity||1;
  const gradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
  gradient.addColorStop(0, rgba(color, 0.4*intensity));
  gradient.addColorStop(0.5, rgba(color, 0.15*intensity));
  gradient.addColorStop(1, rgba(color, 0));
  ctx.fillStyle = gradient;
  ctx.fillRect(x-radius, y-radius, radius*2, radius*2);
}
function drawShadow(ctx, x, y, rx, ry, alpha) {
  alpha = alpha||0.3;
  drawEllipse(ctx, x, y, rx, ry, `rgba(0,0,0,${alpha})`);
}

// ============================================================
// RENDER ARENA
// ============================================================
function renderArena(ctx, cam, cw, ch, time, arenaRadius) {
  const bgGrad = ctx.createRadialGradient(cw/2, ch/2, 0, cw/2, ch/2, Math.max(cw,ch));
  bgGrad.addColorStop(0, '#1a0a2e'); bgGrad.addColorStop(0.5, '#0d0520'); bgGrad.addColorStop(1, '#050210');
  ctx.fillStyle = bgGrad; ctx.fillRect(0, 0, cw, ch);
  const starSeed = 12345;
  for (let i = 0; i < 120; i++) {
    const sx = ((starSeed*(i+1)*7919) % cw);
    const sy = ((starSeed*(i+1)*6271) % ch);
    const twinkle = Math.sin(time*2+i*0.7)*0.5+0.5;
    const size = 1+(i%3)*0.5;
    ctx.globalAlpha = 0.3+twinkle*0.5;
    drawCircle(ctx, sx, sy, size, '#ffffff');
  }
  ctx.globalAlpha = 1;
  const gc = worldToScreen(0, 0, 0, cam, cw, ch);
  const groundRx = arenaRadius*cam.zoom;
  const groundRy = arenaRadius*cam.zoom*0.6;
  for (let layer = 3; layer >= 0; layer--) {
    const expand = layer*8; const alpha = 0.15-layer*0.03;
    drawEllipse(ctx, gc.sx, gc.sy, groundRx+expand, groundRy+expand, `rgba(100,50,200,${alpha})`, `rgba(150,80,255,${alpha})`);
  }
  const groundGrad = ctx.createRadialGradient(gc.sx, gc.sy, 0, gc.sx, gc.sy, groundRx);
  groundGrad.addColorStop(0, '#2a1545'); groundGrad.addColorStop(0.5, '#1e0f35');
  groundGrad.addColorStop(0.85, '#150a28'); groundGrad.addColorStop(1, '#0a0515');
  ctx.beginPath(); ctx.ellipse(gc.sx, gc.sy, groundRx, groundRy, 0, 0, Math.PI*2);
  ctx.fillStyle = groundGrad; ctx.fill();
  ctx.strokeStyle = 'rgba(150,80,255,0.4)'; ctx.lineWidth = 3; ctx.stroke();
  ctx.globalAlpha = 0.08;
  const gridSize = 60;
  for (let gx = -arenaRadius; gx <= arenaRadius; gx += gridSize) {
    const p1 = worldToScreen(gx, -arenaRadius, 0, cam, cw, ch);
    const p2 = worldToScreen(gx, arenaRadius, 0, cam, cw, ch);
    ctx.beginPath(); ctx.moveTo(p1.sx, p1.sy); ctx.lineTo(p2.sx, p2.sy);
    ctx.strokeStyle = '#8844cc'; ctx.lineWidth = 1; ctx.stroke();
  }
  for (let gy = -arenaRadius; gy <= arenaRadius; gy += gridSize) {
    const p1 = worldToScreen(-arenaRadius, gy, 0, cam, cw, ch);
    const p2 = worldToScreen(arenaRadius, gy, 0, cam, cw, ch);
    ctx.beginPath(); ctx.moveTo(p1.sx, p1.sy); ctx.lineTo(p2.sx, p2.sy);
    ctx.strokeStyle = '#8844cc'; ctx.lineWidth = 1; ctx.stroke();
  }
  ctx.globalAlpha = 1;
  for (let ring = 1; ring <= 3; ring++) {
    const ringR = arenaRadius*(ring/4);
    const rp = worldToScreen(0, 0, 0, cam, cw, ch);
    const rrx = ringR*cam.zoom; const rry = ringR*cam.zoom*0.6;
    ctx.beginPath(); ctx.ellipse(rp.sx, rp.sy, rrx, rry, 0, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(100,60,200,${0.12+Math.sin(time+ring)*0.05})`;
    ctx.lineWidth = 1.5; ctx.setLineDash([8,12]); ctx.stroke(); ctx.setLineDash([]);
  }
  const runeCount = 8;
  for (let i = 0; i < runeCount; i++) {
    const angle = (i/runeCount)*Math.PI*2+time*0.1;
    const d = arenaRadius*0.65;
    const rx = Math.cos(angle)*d; const ry = Math.sin(angle)*d;
    const rp = worldToScreen(rx, ry, 0, cam, cw, ch);
    const glow = Math.sin(time*2+i*Math.PI/4)*0.3+0.5;
    ctx.globalAlpha = glow*0.4;
    drawHexagon(ctx, rp.sx, rp.sy, 8*cam.zoom, `rgba(180,100,255,${glow})`);
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// RENDER ENVIRONMENT OBJECTS
// ============================================================
function renderEnvironmentObject(ctx, obj, cam, cw, ch, time) {
  const p = worldToScreen(obj.x, obj.y, obj.z, cam, cw, ch);
  const s = cam.zoom*obj.scale;
  const bob = Math.sin(time*2+obj.bobTimer)*3;
  switch (obj.type) {
    case 'pillar': {
      drawShadow(ctx, p.sx, p.sy+30*s, 15*s, 8*s, 0.3);
      const pillarGrad = ctx.createLinearGradient(p.sx-10*s, p.sy, p.sx+10*s, p.sy);
      pillarGrad.addColorStop(0, rgba(darken(obj.color,40))); pillarGrad.addColorStop(0.5, rgba(lighten(obj.color,30))); pillarGrad.addColorStop(1, rgba(darken(obj.color,40)));
      ctx.fillStyle = pillarGrad; ctx.fillRect(p.sx-10*s, p.sy-50*s, 20*s, 60*s);
      drawEllipse(ctx, p.sx, p.sy-50*s, 14*s, 6*s, rgba(lighten(obj.color,50)));
      const cGlow = Math.sin(time*3+obj.bobTimer)*0.3+0.7;
      drawGlow(ctx, p.sx, p.sy-60*s+bob, 25*s, obj.secondaryColor, cGlow);
      drawCircle(ctx, p.sx, p.sy-60*s+bob, 6*s, rgba(obj.secondaryColor), rgba(lighten(obj.secondaryColor,80)), 2); break;
    }
    case 'crystal': {
      drawShadow(ctx, p.sx, p.sy+10*s, 12*s, 6*s, 0.25);
      const cGlow = Math.sin(time*2.5+obj.bobTimer)*0.3+0.7;
      drawGlow(ctx, p.sx, p.sy-15*s+bob, 35*s, obj.color, cGlow*obj.glowIntensity);
      ctx.beginPath(); ctx.moveTo(p.sx, p.sy-30*s+bob); ctx.lineTo(p.sx+12*s, p.sy-8*s+bob); ctx.lineTo(p.sx, p.sy+5*s+bob); ctx.lineTo(p.sx-12*s, p.sy-8*s+bob); ctx.closePath();
      const crystGrad = ctx.createLinearGradient(p.sx, p.sy-30*s, p.sx, p.sy+5*s);
      crystGrad.addColorStop(0, rgba(lighten(obj.color,80))); crystGrad.addColorStop(0.5, rgba(obj.color)); crystGrad.addColorStop(1, rgba(darken(obj.color,40)));
      ctx.fillStyle = crystGrad; ctx.fill(); ctx.strokeStyle = rgba(lighten(obj.color,100),0.6); ctx.lineWidth = 1.5; ctx.stroke(); break;
    }
    case 'torch': {
      drawShadow(ctx, p.sx, p.sy+5*s, 8*s, 4*s, 0.2);
      ctx.fillStyle = '#5c3a1e'; ctx.fillRect(p.sx-3*s, p.sy-25*s, 6*s, 30*s);
      const flicker = Math.sin(time*8+obj.bobTimer)*3+Math.cos(time*12+obj.bobTimer*2)*2;
      drawGlow(ctx, p.sx+flicker*0.3, p.sy-32*s, 30*s, {r:255,g:150,b:30}, 0.6+Math.sin(time*5)*0.2);
      drawCircle(ctx, p.sx+flicker*0.3, p.sy-32*s, 7*s+flicker*0.5, 'rgba(255,200,50,0.9)');
      drawCircle(ctx, p.sx+flicker*0.2, p.sy-34*s, 4*s, 'rgba(255,255,200,0.9)'); break;
    }
    case 'fountain': {
      drawShadow(ctx, p.sx, p.sy+5*s, 25*s, 12*s, 0.25);
      drawEllipse(ctx, p.sx, p.sy, 25*s, 12*s, rgba(darken(obj.color,30)), rgba(obj.color));
      drawEllipse(ctx, p.sx, p.sy-5*s, 20*s, 10*s, rgba(obj.color));
      const waterGlow = Math.sin(time*3)*0.2+0.6;
      drawGlow(ctx, p.sx, p.sy-15*s, 20*s, {r:80,g:180,b:255}, waterGlow);
      for (let i = 0; i < 5; i++) {
        const wa = (i/5)*Math.PI*2+time*3; const wr = 8*s;
        const wx = p.sx+Math.cos(wa)*wr; const wy = p.sy-15*s+Math.sin(wa)*wr*0.4-Math.abs(Math.sin(time*4+i))*10*s;
        drawCircle(ctx, wx, wy, 2.5*s, 'rgba(100,200,255,0.7)');
      } break;
    }
    case 'mushroom': {
      drawShadow(ctx, p.sx, p.sy+3*s, 10*s, 5*s, 0.2);
      ctx.fillStyle = '#e8dcc8'; ctx.fillRect(p.sx-4*s, p.sy-12*s, 8*s, 15*s);
      ctx.beginPath(); ctx.arc(p.sx, p.sy-14*s, 12*s, Math.PI, 0); ctx.fillStyle = rgba(obj.color); ctx.fill();
      const dotColor = rgba(lighten(obj.color,100));
      drawCircle(ctx, p.sx-5*s, p.sy-18*s, 2.5*s, dotColor); drawCircle(ctx, p.sx+4*s, p.sy-20*s, 2*s, dotColor); drawCircle(ctx, p.sx+1*s, p.sy-16*s, 1.5*s, dotColor);
      const mGlow = Math.sin(time*2+obj.bobTimer)*0.2+0.3;
      drawGlow(ctx, p.sx, p.sy-14*s, 20*s, obj.color, mGlow); break;
    }
    case 'rock': {
      drawShadow(ctx, p.sx, p.sy+5*s, 15*s, 7*s, 0.25);
      ctx.beginPath(); ctx.moveTo(p.sx-14*s, p.sy+2*s); ctx.lineTo(p.sx-10*s, p.sy-12*s); ctx.lineTo(p.sx+2*s, p.sy-18*s); ctx.lineTo(p.sx+13*s, p.sy-8*s); ctx.lineTo(p.sx+15*s, p.sy+3*s); ctx.closePath();
      const rockGrad = ctx.createLinearGradient(p.sx-14*s, p.sy-18*s, p.sx+15*s, p.sy+3*s);
      rockGrad.addColorStop(0, rgba(lighten(obj.color,20))); rockGrad.addColorStop(1, rgba(darken(obj.color,30)));
      ctx.fillStyle = rockGrad; ctx.fill(); ctx.strokeStyle = rgba(darken(obj.color,50)); ctx.lineWidth = 1; ctx.stroke(); break;
    }
  }
}

// ============================================================
// RENDER PLAYER
// ============================================================
function renderPlayer(ctx, player, cam, cw, ch, time) {
  const bob = Math.sin(player.bobTimer*6)*(player.isMoving ? 4 : 1.5);
  const p = worldToScreen(player.x, player.y, player.z+bob, cam, cw, ch);
  const s = cam.zoom;
  if (player.invincibleTimer > 0 && Math.floor(player.invincibleTimer*10)%2===0) ctx.globalAlpha = 0.5;
  if (player.isDashing) {
    ctx.globalAlpha = 0.3;
    for (let i = 1; i <= 3; i++) {
      const tx = player.x-player.dashDir.x*i*15; const ty = player.y-player.dashDir.y*i*15;
      const tp = worldToScreen(tx, ty, player.z, cam, cw, ch);
      drawCircle(ctx, tp.sx, tp.sy, 18*s*(1-i*0.2), rgba(player.bodyColor,0.3));
    }
    ctx.globalAlpha = 1;
  }
  drawShadow(ctx, p.sx, p.sy+28*s, 20*s, 8*s, 0.35);
  if (player.shield > 0) {
    const shieldAlpha = 0.15+Math.sin(time*4)*0.05;
    drawCircle(ctx, p.sx, p.sy-10*s, 32*s, `rgba(80,180,255,${shieldAlpha})`, 'rgba(100,200,255,0.4)', 2);
  }
  const bodyGrad = ctx.createRadialGradient(p.sx-4*s, p.sy-14*s, 2*s, p.sx, p.sy-8*s, 22*s);
  bodyGrad.addColorStop(0, rgba(lighten(player.bodyColor,60))); bodyGrad.addColorStop(0.6, rgba(player.bodyColor)); bodyGrad.addColorStop(1, rgba(darken(player.bodyColor,50)));
  drawCircle(ctx, p.sx, p.sy-8*s, 20*s, ''); ctx.fillStyle = bodyGrad; ctx.fill();
  ctx.strokeStyle = rgba(darken(player.bodyColor,70)); ctx.lineWidth = 2.5*s; ctx.stroke();
  ctx.fillStyle = '#8B6914'; ctx.fillRect(p.sx-18*s, p.sy-2*s, 36*s, 5*s);
  drawCircle(ctx, p.sx, p.sy, 4*s, '#FFD700', '#8B6914', 1);
  const eyeOffX = Math.cos(player.angle)*5*s; const eyeOffY = Math.sin(player.angle)*2*s;
  drawCircle(ctx, p.sx-7*s+eyeOffX*0.3, p.sy-14*s+eyeOffY*0.3, 5*s, '#ffffff', '#333', 1);
  drawCircle(ctx, p.sx+7*s+eyeOffX*0.3, p.sy-14*s+eyeOffY*0.3, 5*s, '#ffffff', '#333', 1);
  drawCircle(ctx, p.sx-7*s+eyeOffX*0.6, p.sy-14*s+eyeOffY*0.6, 2.5*s, '#1a1a2e');
  drawCircle(ctx, p.sx+7*s+eyeOffX*0.6, p.sy-14*s+eyeOffY*0.6, 2.5*s, '#1a1a2e');
  drawCircle(ctx, p.sx-8*s+eyeOffX*0.4, p.sy-15*s+eyeOffY*0.4, 1.2*s, '#ffffff');
  drawCircle(ctx, p.sx+6*s+eyeOffX*0.4, p.sy-15*s+eyeOffY*0.4, 1.2*s, '#ffffff');
  ctx.beginPath(); ctx.arc(p.sx+eyeOffX*0.2, p.sy-7*s, 4*s, 0.1, Math.PI-0.1);
  ctx.strokeStyle = '#1a1a2e'; ctx.lineWidth = 1.5*s; ctx.stroke();
  const hatTilt = Math.sin(player.bobTimer*6)*0.08;
  ctx.save(); ctx.translate(p.sx, p.sy-26*s); ctx.rotate(hatTilt);
  drawEllipse(ctx, 0, 2*s, 24*s, 7*s, rgba(darken(player.hatColor,20)));
  ctx.beginPath(); ctx.moveTo(-18*s, 2*s); ctx.quadraticCurveTo(-8*s, -25*s, 5*s, -40*s); ctx.quadraticCurveTo(10*s, -42*s, 8*s, -38*s); ctx.lineTo(18*s, 2*s); ctx.closePath();
  const hatGrad = ctx.createLinearGradient(-18*s, 0, 18*s, 0);
  hatGrad.addColorStop(0, rgba(darken(player.hatColor,30))); hatGrad.addColorStop(0.5, rgba(lighten(player.hatColor,20))); hatGrad.addColorStop(1, rgba(darken(player.hatColor,40)));
  ctx.fillStyle = hatGrad; ctx.fill(); ctx.strokeStyle = rgba(darken(player.hatColor,60)); ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = '#FFD700'; ctx.fillRect(-17*s, -2*s, 34*s, 4*s);
  drawStar(ctx, 0, -4*s, 5, 5*s, 2.5*s, '#FFD700');
  const tipGlow = Math.sin(time*3)*0.3+0.7;
  drawGlow(ctx, 6*s, -39*s, 15*s, {r:255,g:220,b:80}, tipGlow);
  drawCircle(ctx, 6*s, -39*s, 3*s, `rgba(255,255,200,${tipGlow})`);
  ctx.restore();
  const staffAngle = player.angle;
  const staffBaseX = p.sx+Math.cos(staffAngle)*20*s; const staffBaseY = p.sy-5*s+Math.sin(staffAngle)*10*s;
  const staffTipX = p.sx+Math.cos(staffAngle)*38*s; const staffTipY = p.sy-20*s+Math.sin(staffAngle)*15*s;
  ctx.beginPath(); ctx.moveTo(staffBaseX, staffBaseY); ctx.lineTo(staffTipX, staffTipY);
  ctx.strokeStyle = '#6B3A1F'; ctx.lineWidth = 4*s; ctx.stroke();
  ctx.strokeStyle = '#8B5A2F'; ctx.lineWidth = 2.5*s; ctx.stroke();
  const orbGlow = player.staffGlow+Math.sin(time*4)*0.3;
  drawGlow(ctx, staffTipX, staffTipY, 25*s, {r:180,g:100,b:255}, orbGlow);
  drawCircle(ctx, staffTipX, staffTipY, 7*s, 'rgba(200,150,255,0.9)', 'rgba(255,200,255,0.8)', 2);
  drawCircle(ctx, staffTipX-2*s, staffTipY-2*s, 3*s, 'rgba(255,255,255,0.7)');
  for (let i = 0; i < 3; i++) {
    const orbA = player.orbAngle+(i*Math.PI*2)/3; const orbDist = 28*s;
    const ox = p.sx+Math.cos(orbA)*orbDist; const oy = p.sy-8*s+Math.sin(orbA)*orbDist*0.4;
    const colors = [{r:255,g:100,b:50},{r:50,g:150,b:255},{r:100,g:255,b:100}];
    drawGlow(ctx, ox, oy, 10*s, colors[i], 0.5+Math.sin(time*3+i)*0.2);
    drawCircle(ctx, ox, oy, 3.5*s, rgba(colors[i]), rgba(lighten(colors[i],80)), 1);
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// RENDER ENEMY
// ============================================================
function renderEnemy(ctx, enemy, cam, cw, ch, time) {
  if (enemy.isDead && enemy.deathAnim <= 0) return;
  const bob = Math.sin(enemy.bobTimer*4+enemy.id)*3;
  const p = worldToScreen(enemy.x, enemy.y, enemy.z+bob, cam, cw, ch);
  const s = cam.zoom*enemy.scale;
  if (enemy.isDead) { ctx.globalAlpha = enemy.deathAnim; const ds = 1+(1-enemy.deathAnim)*0.5; ctx.save(); ctx.translate(p.sx,p.sy); ctx.scale(ds,ds); ctx.translate(-p.sx,-p.sy); }
  if (enemy.spawnAnim < 1) { ctx.globalAlpha = enemy.spawnAnim; const ss = 0.3+enemy.spawnAnim*0.7; ctx.save(); ctx.translate(p.sx,p.sy); ctx.scale(ss,ss); ctx.translate(-p.sx,-p.sy); }
  if (enemy.frozen) ctx.globalAlpha *= 0.8;
  if (enemy.hitFlash > 0) ctx.globalAlpha = 0.6+enemy.hitFlash*0.4;
  drawShadow(ctx, p.sx, p.sy+22*s, 16*s, 7*s, 0.3);
  if (enemy.isBoss) {
    const auraGlow = Math.sin(time*3)*0.2+0.5;
    drawGlow(ctx, p.sx, p.sy-5*s, 50*s, enemy.color, auraGlow);
    for (let i = 0; i < 6; i++) {
      const da = time*2+(i*Math.PI)/3; const dd = 35*s;
      const dx = p.sx+Math.cos(da)*dd; const dy = p.sy-5*s+Math.sin(da)*dd*0.5;
      drawStar(ctx, dx, dy, 4, 4*s, 2*s, rgba(enemy.color, 0.5+Math.sin(time*4+i)*0.3));
    }
  }
  switch (enemy.type) {
    case 'slime': {
      const squish = Math.sin(enemy.bobTimer*5)*0.1;
      const bW = 22*s*(1+squish); const bH = 18*s*(1-squish);
      const slimeGrad = ctx.createRadialGradient(p.sx-4*s, p.sy-10*s, 2, p.sx, p.sy, bW);
      slimeGrad.addColorStop(0, rgba(lighten(enemy.color,80))); slimeGrad.addColorStop(0.7, rgba(enemy.color)); slimeGrad.addColorStop(1, rgba(darken(enemy.color,40)));

// ============================================================
// RENDER PROJECTILE
// ============================================================
function renderProjectile(ctx, proj, cam, cw, ch, time) {
  const p = worldToScreen(proj.x, proj.y, proj.z, cam, cw, ch);
  const s = cam.zoom; const lifeRatio = proj.life/proj.maxLife;
  if (proj.trail.length > 1) {
    ctx.beginPath();
    for (let i = 0; i < proj.trail.length; i++) {
      const tp = worldToScreen(proj.trail[i].x, proj.trail[i].y, proj.trail[i].z, cam, cw, ch);
      const alpha = (i/proj.trail.length)*0.6*lifeRatio;
      if (i===0) ctx.moveTo(tp.sx, tp.sy); else ctx.lineTo(tp.sx, tp.sy);
      ctx.strokeStyle = rgba(proj.color, alpha); ctx.lineWidth = (i/proj.trail.length)*proj.radius*s*2;
    }
    ctx.stroke();
  }
  drawGlow(ctx, p.sx, p.sy, proj.radius*s*4, proj.color, 0.6*lifeRatio);
  switch (proj.spell) {
    case 'fireball': {
      const fireGrad = ctx.createRadialGradient(p.sx, p.sy, 0, p.sx, p.sy, proj.radius*s*2);
      fireGrad.addColorStop(0,'rgba(255,255,200,0.95)'); fireGrad.addColorStop(0.3,rgba(proj.color,0.9)); fireGrad.addColorStop(0.7,rgba(proj.secondaryColor,0.6)); fireGrad.addColorStop(1,'rgba(255,50,0,0)');
      drawCircle(ctx, p.sx, p.sy, proj.radius*s*2, ''); ctx.fillStyle = fireGrad; ctx.fill(); break;
    }
    case 'iceShard': {
      ctx.save(); ctx.translate(p.sx, p.sy); ctx.rotate(time*5);
      drawStar(ctx, 0, 0, 6, proj.radius*s*1.8, proj.radius*s*0.8, rgba(proj.color,0.9));
      drawStar(ctx, 0, 0, 6, proj.radius*s*1.2, proj.radius*s*0.5, 'rgba(200,240,255,0.9)');
      ctx.restore(); break;
    }
    case 'lightning': {
      drawCircle(ctx, p.sx, p.sy, proj.radius*s*1.5, rgba(proj.color,0.8));
      drawCircle(ctx, p.sx, p.sy, proj.radius*s*0.8, 'rgba(255,255,255,0.9)');
      for (let i = 0; i < 4; i++) {
        const la = time*10+i*Math.PI/2; const lr = proj.radius*s*3;
        ctx.beginPath(); ctx.moveTo(p.sx, p.sy);
        const midX = p.sx+Math.cos(la)*lr*0.5+(Math.random()-0.5)*8; const midY = p.sy+Math.sin(la)*lr*0.5+(Math.random()-0.5)*8;
        ctx.lineTo(midX, midY); ctx.lineTo(p.sx+Math.cos(la)*lr, p.sy+Math.sin(la)*lr);
        ctx.strokeStyle = rgba(proj.color,0.6); ctx.lineWidth = 1.5; ctx.stroke();
      } break;
    }
    case 'arcaneNova': {
      const novaProgress = 1-lifeRatio; const novaR = proj.aoe*s*novaProgress;
      ctx.beginPath(); ctx.arc(p.sx, p.sy, novaR, 0, Math.PI*2);
      ctx.strokeStyle = rgba(proj.color, lifeRatio*0.8); ctx.lineWidth = 4*s*lifeRatio; ctx.stroke();
      ctx.fillStyle = rgba(proj.color, lifeRatio*0.15); ctx.fill();
      ctx.beginPath(); ctx.arc(p.sx, p.sy, novaR*0.6, 0, Math.PI*2);
      ctx.strokeStyle = rgba(proj.secondaryColor, lifeRatio*0.5); ctx.lineWidth = 2*s; ctx.stroke(); break;
    }
    case 'voidBeam': {
      drawCircle(ctx, p.sx, p.sy, proj.radius*s*2, rgba(proj.color,0.7));
      drawCircle(ctx, p.sx, p.sy, proj.radius*s, rgba(proj.secondaryColor,0.9));
      for (let i = 0; i < 3; i++) {
        const va = time*8+i*2; const vd = proj.radius*s*2.5;
        drawCircle(ctx, p.sx+Math.cos(va)*vd, p.sy+Math.sin(va)*vd, 2*s, rgba(proj.color,0.5));
      } break;
    }
    case 'healAura': {
      const healR = proj.aoe*s*(1-lifeRatio);
      drawGlow(ctx, p.sx, p.sy, healR, {r:50,g:255,b:100}, lifeRatio*0.4);
      ctx.strokeStyle = rgba({r:100,g:255,b:150}, lifeRatio*0.6); ctx.lineWidth = 3*s;
      ctx.beginPath(); ctx.moveTo(p.sx, p.sy-8*s); ctx.lineTo(p.sx, p.sy+8*s); ctx.moveTo(p.sx-8*s, p.sy); ctx.lineTo(p.sx+8*s, p.sy); ctx.stroke(); break;
    }
    default: {
      drawCircle(ctx, p.sx, p.sy, proj.radius*s*1.5, rgba(proj.color,0.8)); break;
    }
  }
}

// ============================================================
// RENDER PARTICLE
// ============================================================
function renderParticle(ctx, part, cam, cw, ch) {
  const p = worldToScreen(part.x, part.y, part.z, cam, cw, ch);
  const lifeRatio = part.life/part.maxLife;
  const size = part.shrink ? part.size*lifeRatio*cam.zoom : part.size*cam.zoom;
  const alpha = lifeRatio*(part.color.a||1);
  if (size <= 0.5 || alpha <= 0.01) return;
  ctx.globalAlpha = alpha;
  if (part.glow) drawGlow(ctx, p.sx, p.sy, size*3, part.color, alpha*0.5);
  if (part.pulse) { ctx.save(); ctx.translate(p.sx,p.sy); ctx.scale(1+Math.sin(part.life*10)*0.2,1+Math.sin(part.life*10)*0.2); ctx.translate(-p.sx,-p.sy); }
  const color = rgba(part.color);
  switch (part.shape) {
    case 'circle': drawCircle(ctx, p.sx, p.sy, size, color); break;
    case 'square': ctx.save(); ctx.translate(p.sx,p.sy); ctx.rotate(part.rotation); ctx.fillStyle=color; ctx.fillRect(-size,-size,size*2,size*2); ctx.restore(); break;
    case 'star': ctx.save(); ctx.translate(p.sx,p.sy); ctx.rotate(part.rotation); drawStar(ctx,0,0,5,size,size*0.4,color); ctx.restore(); break;
    case 'triangle': drawTriangle(ctx, p.sx, p.sy, size, color, part.rotation); break;
    case 'ring': drawCircle(ctx, p.sx, p.sy, size, '', color, 2); break;
    case 'spark': ctx.beginPath(); ctx.moveTo(p.sx-size*2,p.sy); ctx.lineTo(p.sx,p.sy-size*0.3); ctx.lineTo(p.sx+size*2,p.sy); ctx.lineTo(p.sx,p.sy+size*0.3); ctx.closePath(); ctx.fillStyle=color; ctx.fill(); break;
    case 'hex': drawHexagon(ctx, p.sx, p.sy, size, color, part.rotation); break;
  }
  if (part.pulse) ctx.restore();
  ctx.globalAlpha = 1;
}

// ============================================================
// RENDER PICKUP
// ============================================================
function renderPickup(ctx, item, cam, cw, ch, time) {
  if (item.collected) return;
  const bob = Math.sin(time*3+item.bobTimer)*5;
  const p = worldToScreen(item.x, item.y, item.z+5+bob, cam, cw, ch);
  const s = cam.zoom;
  drawShadow(ctx, p.sx, p.sy+20*s, 8*s, 4*s, 0.2);
  const glow = Math.sin(time*4+item.bobTimer)*0.2+item.glowIntensity;
  drawGlow(ctx, p.sx, p.sy, 20*s, item.color, glow);
  switch (item.type) {
    case 'health':
      ctx.fillStyle = rgba(item.color); ctx.beginPath();
      ctx.moveTo(p.sx, p.sy+5*s); ctx.bezierCurveTo(p.sx-10*s,p.sy-5*s,p.sx-10*s,p.sy-12*s,p.sx,p.sy-7*s); ctx.bezierCurveTo(p.sx+10*s,p.sy-12*s,p.sx+10*s,p.sy-5*s,p.sx,p.sy+5*s); ctx.fill();
      drawCircle(ctx, p.sx-3*s, p.sy-8*s, 2*s, 'rgba(255,255,255,0.5)'); break;
    case 'mana':
      ctx.beginPath(); ctx.moveTo(p.sx,p.sy-10*s); ctx.lineTo(p.sx+7*s,p.sy); ctx.lineTo(p.sx,p.sy+10*s); ctx.lineTo(p.sx-7*s,p.sy); ctx.closePath();
      ctx.fillStyle = rgba(item.color); ctx.fill(); ctx.strokeStyle = rgba(lighten(item.color,80)); ctx.lineWidth = 1.5; ctx.stroke(); break;
    case 'xp': drawStar(ctx, p.sx, p.sy, 5, 9*s, 4*s, rgba(item.color)); drawStar(ctx, p.sx, p.sy, 5, 5*s, 2*s, rgba(lighten(item.color,100))); break;
    case 'gold': drawCircle(ctx, p.sx, p.sy, 8*s, rgba(item.color), rgba(darken(item.color,40)), 2); drawCircle(ctx, p.sx, p.sy, 5*s, rgba(lighten(item.color,60))); break;
    default: drawCircle(ctx, p.sx, p.sy, 8*s, rgba(item.color)); break;
  }
}

// ============================================================
// RENDER DAMAGE TEXT
// ============================================================
function renderDamageText(ctx, dt) {
  const lifeRatio = dt.life/dt.maxLife;
  ctx.globalAlpha = lifeRatio;
  const size = dt.isCrit ? dt.size*1.3 : dt.size;
  ctx.font = `bold ${size}px Arial`; ctx.textAlign = 'center';
  ctx.strokeStyle = '#000'; ctx.lineWidth = 4;
  ctx.strokeText(dt.text, dt.x, dt.y); ctx.fillStyle = dt.color; ctx.fillText(dt.text, dt.x, dt.y);
  if (dt.isCrit) {
    ctx.font = `bold ${size*0.5}px Arial`; ctx.fillStyle = '#FFD700';
    ctx.strokeText('CRIT!', dt.x, dt.y-size); ctx.fillText('CRIT!', dt.x, dt.y-size);
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// UTILITY
// ============================================================
function dist(x1,y1,x2,y2) { return Math.sqrt((x2-x1)**2+(y2-y1)**2); }
function angleTo(x1,y1,x2,y2) { return Math.atan2(y2-y1,x2-x1); }
function lerp(a,b,t) { return a+(b-a)*t; }
function clamp(v,mn,mx) { return Math.max(mn,Math.min(mx,v)); }
function randomRange(min,max) { return min+Math.random()*(max-min); }
function randomInt(min,max) { return Math.floor(randomRange(min,max+1)); }
function randomColor(base,variance) {
  return { r:clamp(base.r+randomRange(-variance,variance),0,255), g:clamp(base.g+randomRange(-variance,variance),0,255), b:clamp(base.b+randomRange(-variance,variance),0,255), a:base.a };
}

const SAVE_KEY = 'magic_arena_save_v2';
function getDefaultSave() {
  return { totalGold:0, highScore:0, bestWave:0, gamesPlayed:0, totalKills:0, homeUpgrades:{}, unlockedSpells:['fireball','iceShard','lightning','arcaneNova'], hatColorIndex:0, bodyColorIndex:0 };
}
function loadSave() {
  try { const raw = localStorage.getItem(SAVE_KEY); if (raw) return {...getDefaultSave(),...JSON.parse(raw)}; } catch(e){}
  return getDefaultSave();
}
function saveSave(data) {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); } catch(e){}
}

  buyHomeShopItem(id) {
    const items = this.getHomeShopItems();
    const item = items.find(i=>i.id===id);
    if (!item || item.level>=item.maxLevel || this.saveData.totalGold<item.cost) return;
    this.saveData.totalGold -= item.cost;
    if (id.startsWith('spell_')) {
      const spellType = id.replace('spell_','');
      if (!this.saveData.unlockedSpells.includes(spellType)) this.saveData.unlockedSpells.push(spellType);
    } else if (id.startsWith('hat_')) {
      const idx = parseInt(id.replace('hat_',''));
      this.saveData.homeUpgrades[id]=1; this.saveData.hatColorIndex=idx;
    } else if (id.startsWith('body_')) {
      const idx = parseInt(id.replace('body_',''));
      this.saveData.homeUpgrades[id]=1; this.saveData.bodyColorIndex=idx;
    } else {
      this.saveData.homeUpgrades[id]=(this.saveData.homeUpgrades[id]||0)+1;
    }
    saveSave(this.saveData); this.initAllSpells(); this.resetPlayer();
  }

    if (id.startsWith('hat_')) {
      const idx = parseInt(id.replace('hat_',''));
      if (idx===0||(this.saveData.homeUpgrades[id]||0)>0) { this.saveData.hatColorIndex=idx; saveSave(this.saveData); this.resetPlayer(); }
    } else if (id.startsWith('body_')) {
      const idx = parseInt(id.replace('body_',''));
      if (idx===0||(this.saveData.homeUpgrades[id]||0)>0) { this.saveData.bodyColorIndex=idx; saveSave(this.saveData); this.resetPlayer(); }
    }
  }

  generateEnvironment() {
    this.environment = [];

    for (let i = 0; i < 25; i++) {
      const angle = (i/25)*Math.PI*2+randomRange(-0.2,0.2);
      const d = randomRange(this.arenaRadius*0.3, this.arenaRadius*0.85);
      const type = types[i%types.length];
      const colorMap = { pillar:{r:80,g:60,b:120}, crystal:{r:100+Math.random()*100,g:100+Math.random()*100,b:255}, torch:{r:100,g:60,b:30}, rock:{r:90,g:80,b:100}, mushroom:{r:200,g:50,b:80}, fountain:{r:80,g:70,b:120} };
      this.environment.push({ x:Math.cos(angle)*d, y:Math.sin(angle)*d, z:0, type, color:colorMap[type], secondaryColor:{r:180,g:100,b:255}, scale:randomRange(0.8,1.2), rotation:randomRange(0,Math.PI*2), bobTimer:randomRange(0,Math.PI*2), glowIntensity:randomRange(0.3,0.8), radius:15 });
    }
  }

    this.canvas.addEventListener('touchend', (e)=>this.onTouchEnd(e), {passive:false});
    this.canvas.addEventListener('touchcancel', (e)=>this.onTouchEnd(e), {passive:false});
    this.canvas.addEventListener('mousedown', (e)=>this.onMouseDown(e));
    this.canvas.addEventListener('mousemove', (e)=>this.onMouseMove(e));
    this.canvas.addEventListener('mouseup', ()=>this.onMouseUp());
    window.addEventListener('keydown', (e)=>{ this.keys[e.key.toLowerCase()]=true; });

      if (this.state==='home') { this.handleHomeClick(x,y); return; }
      if (this.state==='homeShop') { this.handleHomeShopClick(x,y); return; }
      if (this.state==='gameover') { this.handleGameOverClick(x,y); return; }
      if (this.state==='upgrading') { this.handleUpgradeClick(x,y); return; }
      if (this.state==='waveShop') { this.handleWaveShopClick(x,y); return; }
      if (this.state==='playing') {
        if (this.handleSpellButtonClick(x,y)) return;
        if (this.isInFireButton(x,y)) { this.fireButtonHeld=true; this.fireButtonTouchId=touch.identifier; this.castSpell(); return; }
        if (this.isInDashButton(x,y)) { this.dash(); return; }
        if (x<this.cw*0.5) { if (!this.moveJoystick.active) this.moveJoystick={active:true,startX:x,startY:y,currentX:x,currentY:y,dx:0,dy:0,touchId:touch.identifier}; }

  onTouchMove(e) {

      const updateJs = (js) => {

        const dx=js.currentX-js.startX, dy=js.currentY-js.startY;
        const d=Math.sqrt(dx*dx+dy*dy), maxD=60;
        if (d>maxD) { js.dx=(dx/d)*maxD; js.dy=(dy/d)*maxD; } else { js.dx=dx; js.dy=dy; }

    }
  }

    }
  }

    else if (this.state==='homeShop') this.handleHomeShopClick(e.clientX,e.clientY);
    else if (this.state==='gameover') this.handleGameOverClick(e.clientX,e.clientY);
    else if (this.state==='upgrading') this.handleUpgradeClick(e.clientX,e.clientY);
    else if (this.state==='waveShop') this.handleWaveShopClick(e.clientX,e.clientY);

  handleHomeClick(x,y) {
    const btnW=Math.min(250,this.cw*0.5), btnH=55, btnX=(this.cw-btnW)/2;
    const playY=this.ch*0.62;
    if (x>=btnX&&x<=btnX+btnW&&y>=playY&&y<=playY+btnH) { this.startGame(); return; }
    const shopY=this.ch*0.72;
    if (x>=btnX&&x<=btnX+btnW&&y>=shopY&&y<=shopY+btnH) { this.state='homeShop'; this.homeShopTab='spells'; this.homeShopScroll=0; }
  }

  handleHomeShopClick(x,y) {
    if (x<60&&y<50) { this.state='home'; return; }
    const tabY=55, tabW=Math.min(100,this.cw/3.5);
    const tabs=['spells','upgrades','cosmetics'];
    const totalTabW=tabs.length*(tabW+6)-6;
    const tabStartX=(this.cw-totalTabW)/2;
    for (let i = 0; i < tabs.length; i++) {
      const tx=tabStartX+i*(tabW+6);
      if (x>=tx&&x<=tx+tabW&&y>=tabY&&y<=tabY+32) { this.homeShopTab=tabs[i]; this.homeShopScroll=0; return; }
    }
    const items=this.getHomeShopItems().filter(i=>i.category===this.homeShopTab);
    const cardW=Math.min(140,(this.cw-50)/3), cardH=this.homeShopTab==='cosmetics'?100:115;
    const cols=Math.max(2,Math.floor((this.cw-30)/(cardW+8))), spacing=8;
    const gridW=cols*(cardW+spacing)-spacing;
    const startX=(this.cw-gridW)/2, startY=100;
    for (let i = 0; i < items.length; i++) {
      const item=items[i], col=i%cols, row=Math.floor(i/cols);
      const cx=startX+col*(cardW+spacing), cy=startY+row*(cardH+spacing)-this.homeShopScroll;
      if (x>=cx&&x<=cx+cardW&&y>=cy&&y<=cy+cardH) {
        if (item.level>=item.maxLevel) this.selectCosmetic(item.id); else this.buyHomeShopItem(item.id);
        return;
      }
    }
  }

  handleGameOverClick(x,y) {

    const btn2Y=this.ch*0.82;

  handleSpellButtonClick(x,y) {

    const btnSize=44, spacing=8;
    const totalW=unlockedSpells.length*(btnSize+spacing)-spacing;
    const startX=(this.cw-totalW)/2, btnY=this.ch-70;
    for (let i = 0; i < unlockedSpells.length; i++) {

  }

  generateWave(waveNum) {
    const isBoss=waveNum%5===0;
    const enemies=[];
    const baseCount=Math.min(4+Math.floor(waveNum*1.1),35);
    const available=['slime'];
    if (waveNum>=2) available.push('bat');
    if (waveNum>=4) available.push('ghost');
    if (waveNum>=6) available.push('mushroom');
    if (waveNum>=8) available.push('skeleton');
    if (waveNum>=10) available.push('golem');
    const perType=Math.max(1,Math.floor(baseCount/available.length));
    for (const type of available) enemies.push({type, count:perType+randomInt(0,2)});
    const bossTypes=['wizard','dragon','golem','wizard','dragon'];
    const bossType=bossTypes[(Math.floor(waveNum/5)-1)%bossTypes.length];
    return { number:waveNum, enemies, isBossWave:isBoss, bossType:isBoss?bossType:undefined, spawnDelay:Math.max(0.2,1.5-waveNum*0.03), message:isBoss?`⚠️ BOSS - VAGUE ${waveNum} ⚠️`:`Vague ${waveNum}` };
  }

  updateWaveSpawning(dt) {

    if (!this.currentWaveData) return;

    this.spawnTimer-=dt;
